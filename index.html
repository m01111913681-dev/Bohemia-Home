<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bohemia iHome Decor - Boho Monochromatic Home Decor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --beige: #F5F5F0;
            --off-white: #FAFAFA;
            --black: #1A1A1A;
            --dark-gray: #333333;
            --light-gray: #8B8B8B;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--dark-gray);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Cart Header Button */
        .cart-header {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 99;
        }

        .cart-btn {
            width: 1px;
            height: 1px;
            background: rgba(255,255,255,0.95);
            border: 2px solid var(--dark-gray);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--dark-gray);
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .cart-btn:hover {
            background: var(--dark-gray);
            color: white;
            transform: scale(1.1) rotate(5deg);
            box-shadow: var(--shadow-hover);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* Boho Decorative Elements */
        .boho-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dark-gray), transparent);
            margin: 3rem 0;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('img6.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-content {
            max-width: 800px;
            padding: 0 2rem;
            animation: fadeInUp 1.2s ease-out;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .hero .bio {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-bottom: 2rem;
            opacity: 0.95;
            line-height: 1.5;
        }

        .hero .location {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
        }

        .cta-btn {
            display: inline-block;
            background: transparent;
            color: white;
            padding: 1rem 2.5rem;
            border: 2px solid white;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-btn:hover {
            background: white;
            color: var(--dark-gray);
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        /* Products Section */
        .products {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3.5rem);
            text-align: center;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--dark-gray), var(--light-gray));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--light-gray);
            font-size: 1.2rem;
            margin-bottom: 4rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.7rem 1.5rem;
            border: 2px solid #eee;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--dark-gray);
            color: white;
            border-color: var(--dark-gray);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-hover);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--dark-gray);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark-gray);
        }

        .add-to-cart {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover .add-to-cart {
            opacity: 1;
            transform: scale(1);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Cart Page */
        .cart-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .cart-page.active {
            display: flex;
        }

        .cart-container {
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-hover);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-header {
            padding: 1.5rem;
            background: var(--beige);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: none;
            border: 2px solid var(--dark-gray);
            color: var(--dark-gray);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--dark-gray);
            color: white;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-info h4 {
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .cart-item-info .price {
            font-weight: 600;
            color: var(--dark-gray);
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .cart-total {
            padding: 1.5rem;
            background: var(--beige);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .whatsapp-order-btn {
            display: block;
            background: #25D366;
            color: white;
            text-align: center;
            padding: 1.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0 1.5rem 1.5rem;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .whatsapp-order-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }

        /* Floating Contact Buttons */
        .contact-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }

        .contact-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 10px 25px rgba(37,211,102,0.4);
        }

        .call-btn {
            background: var(--dark-gray);
            color: white;
        }

        .call-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Footer */
        .footer {
            background: var(--black);
            color: white;
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .footer h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .footer p {
            opacity: 0.8;
            margin-bottom: 1rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            color: var(--light-gray);
            transform: translateY(-3px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .products {
                padding: 3rem 1rem;
            }

            .filters {
                flex-direction: column;
                align-items: center;
            }

            .contact-buttons {
                bottom: 1rem;
                right: 1rem;
            }

            .contact-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }

            .cart-header {
                top: 1.5rem;
                right: 1.5rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--beige);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-gray);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Cart Header Button -->
    <div class="cart-header">
        <button class="cart-btn" onclick="goToCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bohemia iHome Decor</h1>
            <div class="bio">
                <br>
                <span style="font-style: italic; font-size: 1.1em;"></span>
            </div>
            <div class="location"></div>
            <a href="#products" class="cta-btn">View Collection</a>
        </div>
    </section>

    <div class="boho-line"></div>

    <!-- Products Section -->
    <section id="products" class="products fade-in">
        <h2 class="section-title">Our Collection</h2>
        <p class="section-subtitle">Discover our curated selection of boho monochromatic home decor</p>
        
        

        <div class="products-grid" id="productsGrid">
            <!-- Products will be populated by JavaScript -->
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img id="lightboxImg" src="" alt="Product">
    </div>

    <!-- Cart Page -->
    <div id="cartPage" class="cart-page">
        <div class="cart-container">
                       <div class="cart-header">
                <button class="back-btn" onclick="goToHome()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <h2>My Cart</h2>
            </div>
            
            <div class="cart-items" id="cartItems">
                <!-- المنتجات هتظهر هنا -->
            </div>
            
            <div class="cart-total">
                <div class="total-row">
                    <span>Total Items: <span id="cartTotalItems">0</span></span>
                    <span>Total: <span id="cartTotalPrice">EGP 0</span></span>
                </div>
            </div>
            
            <a href="#" class="whatsapp-order-btn" id="whatsappBtn" onclick="sendWhatsAppOrder()">
                <i class="fab fa-whatsapp"></i>
                Order via WhatsApp
            </a>
        </div>
    </div>

    <!-- Floating Contact Buttons -->
    <div class="contact-buttons">
        
        <a href="https://wa.me/201011407516" class="contact-btn whatsapp-btn" target="_blank" title="واتساب">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <h3>Bohemia iHome Decor</h3>
            <p>We help turn a house into your comfort home</p>
            <p>Cairo, Egypt</p>
            <div class="social-icons">
                <a href="https://www.instagram.com/bohemia095?igsh=MWQ5cHF4NjkwMDN1cg==" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // Products Data - EASY TO EDIT
        const products = [
            {
                id: 1,
                name: "Boho Woven Basket",
                price: "EGP 450",
                image: "img1.png",
                category: "boho"
            },
            {
                id: 2,
                name: "Monochrome Vase",
                price: "EGP 320",
                image: "img2.png",
                category: "monochrome"
            },
            {
                id: 3,
                name: "Earthy Macrame Wall",
                price: "EGP 680",
                image: "img3.png",
                category: "boho"
            },
            {
                id: 4,
                name: "Minimalist Tray",
                price: "EGP 280",
                image: "img4.png",
                category: "monochrome"
            },
            {
                id: 5,
                name: "Boho Cushion Set",
                price: "EGP 520",
                image: "img5.png",
                category: "boho"
            },
            {
                id: 6,
                name: "Black Ceramic Pot",
                price: "EGP 390",
                image: "img6.png",
                category: "monochrome"
            }
        ];

        // Cart System
        let cart = [];

        // Initialize
        function init() {
            loadCart();
            renderProducts(products);
            setupEventListeners();
            setupScrollAnimations();
            updateCartCount();
        }

        // Cart Functions
        window.addToCart = function(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveCart();
            updateCartCount();
            showNotification(`Added "${product.name}" to cart! (${cart.length} items)`);
        };

        window.removeFromCart = function(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCartCount();
            renderCart();
        };

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count || 0;
        }

        function saveCart() {
            localStorage.setItem('bohemiaCart', JSON.stringify(cart));
        }

        function loadCart() {
            const saved = localStorage.getItem('bohemiaCart');
            if (saved) {
                cart = JSON.parse(saved);
            }
        }

        window.goToCart = function() {
            document.getElementById('cartPage').classList.add('active');
            document.body.style.overflow = 'hidden';
            renderCart();
        };

        window.goToHome = function() {
            document.getElementById('cartPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            let totalPrice = 0;
            
            cart.forEach(item => {
                const priceNum = parseFloat(item.price.replace('EGP ', '').replace(',', ''));
                totalPrice += priceNum * item.quantity;
            });
            
            document.getElementById('cartTotalItems').textContent = totalItems;
            document.getElementById('cartTotalPrice').textContent = `EGP ${totalPrice.toFixed(2)}`;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--light-gray); padding: 2rem;">Your cart is empty 😔</p>';
                document.getElementById('whatsappBtn').style.display = 'none';
            } else {
                container.innerHTML = cart.map(item => {
                    const priceNum = parseFloat(item.price.replace('EGP ', '').replace(',', ''));
                    return `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                <div class="price">${item.price} x ${item.quantity} = EGP ${(priceNum * item.quantity).toFixed(2)}</div>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">
                                Remove
                            </button>
                        </div>
                    `;
                }).join('');
                document.getElementById('whatsappBtn').style.display = 'block';
            }
        }

        window.sendWhatsAppOrder = function() {
            const itemsText = cart.map(item => {
                const priceNum = parseFloat(item.price.replace('EGP ', '').replace(',', ''));
                return `• ${item.name} ×${item.quantity} - EGP ${(priceNum * item.quantity).toFixed(2)}`;
            }).join('\n');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            let totalPrice = 0;
            cart.forEach(item => {
                totalPrice += parseFloat(item.price.replace('EGP ', '').replace(',', '')) * item.quantity;
            });
            
            const message = `مرحبا Bohemia iHome Decor! 👋\n\nأريد طلب المنتجات التالية:\n\n${itemsText}\n\n📊 الملخص:\nالعدد الكلي: ${totalItems} قطعة\n💰 السعر الكلي: EGP ${totalPrice.toFixed(2)}\n\nشكراً! 🙏`;
            
            const phone = '+201011407516';
            const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
            goToHome();
        };

        // Render Products
        function renderProducts(productList) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = productList.map(product => `
                <div class="product-card fade-in" data-category="${product.category}">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                    <button class="add-to-cart" onclick="addToCart(${product.id})">
                        <i class="fas fa-shopping-cart"></i>
                    </button>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">${product.price}</div>
                    </div>
                </div>
            `).join('');
        }

        // Filter Products
        function setupEventListeners() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    
                    const filter = btn.dataset.filter;
                    if (filter === 'all') {
                        renderProducts(products);
                    } else {
                        const filtered = products.filter(p => p.category === filter);
                        renderProducts(filtered);
                    }
                });
            });

            // Lightbox
            document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
            document.getElementById('lightbox').addEventListener('click', (e) => {
                if (e.target.id === 'lightbox') closeLightbox();
            });
        }

        // Lightbox Functions
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('product-image')) {
                const imgSrc = e.target.src;
                openLightbox(imgSrc);
            }
        });

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: var(--dark-gray);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 10px;
                z-index: 1001;
                transform: translateX(400px);
                transition: all 0.3s ease;
                box-shadow: var(--shadow);
                font-size: 0.9rem;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.transform = 'translateX(0)';
            }, 100);

            setTimeout(() => {
                notification.style.transform = 'translateX(400px)';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        function setupScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }

        document.querySelector('.cta-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('products').scrollIntoView({
                behavior: 'smooth'
            });
        });

        function makeCall() {
            const phoneNumber = '+201011407516';
            const protocols = [
                `tel:+${phoneNumber}`,
                `tel://${phoneNumber}`,
                `callto:${phoneNumber}`
            ];
            
            let opened = false;
            for (let protocol of protocols) {
                try {
                    window.open(protocol, '_self');
                    opened = true;
                    break;
                } catch (e) {
                    continue;
                }
            }
            
            if (!opened) {
                window.open(`https://wa.me/${phoneNumber}`, '_blank');
            }
        }

        // Initialize everything
        init();
    </script>
</body>
</html>
